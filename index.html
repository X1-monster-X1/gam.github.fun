<!DOCTYPE html> <!-- تعريف نوع المستند HTML5 -->
<html lang="ar" dir="rtl"> <!-- لغة الصفحة عربية واتجاه من اليمين لليسار -->
<head>
<meta charset="utf-8"> <!-- ترميز يدعم العربية -->
<meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- استجابة للشاشات -->
<title>لعبة الديناصور والخفافيش</title> <!-- عنوان الصفحة -->

<style>
/* ----------------- CSS عام ----------------- */
body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; background: #ffffff; } /* إعدادات الجسم */
canvas { display: block; } /* الكانفس ككتلة */

/* شاشة البداية */
#startScreen {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.96);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 100;
}

/* صندوق QR */
#qrBox { border: 3px solid #000; padding: 10px; background: #fff; margin-bottom: 18px; text-align: center; }
#qrBox img { width: 160px; height: 160px; display: block; }

/* أزرار عامة */
.btn { padding: 12px 22px; font-size: 18px; margin: 8px; cursor: pointer; border: 2px solid #000; background: #fff; border-radius: 6px; }
.btn:hover { background: #000; color: #fff; }

/* نافذة الإعدادات (منبثقة) */
#settingsMenu {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: #fff; padding: 16px; border: 3px solid #000; display: none; z-index: 200; border-radius: 8px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* HUD (عرض النقاط) */
#hud { position: absolute; top: 12px; left: 12px; font-size: 20px; font-weight: bold; z-index: 50;
       background: rgba(255,255,255,0.85); padding: 6px 10px; border-radius: 6px; border: 2px solid #000; }

/* عنصر اللاعب: الآن صورة ديناصور */
#player {
  position: absolute;
  width: 72px; height: 72px; /* حجم اللاعب */
  pointer-events: none; z-index: 10;
  transform: translate(-50%, -50%); /* مركزية الصورة حول المؤشر */
}

/* زر الإيقاف/الاستئناف أثناء اللعب */
#pauseBtn {
  position: absolute; top: 12px; right: 12px; z-index: 60;
  padding: 10px 14px; font-size: 16px; border-radius: 8px; border: 2px solid #000; background: #fff; cursor: pointer;
}
#pauseBtn:hover { background: #000; color: #fff; }

/* شاشة الخسارة */
#gameOver {
  position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column;
  align-items: center; justify-content: center; color: #fff; z-index: 300; text-align: center; padding: 20px;
}
#scoreList { margin-top: 14px; font-size: 18px; line-height: 30px; }

/* تحسينات صغيرة للمدخلات */
input[type="color"], select { margin: 6px 0; padding: 6px; }
.muted { font-size: 13px; color: #333; opacity: 0.85; }
</style>
</head>

<body>

<!-- شاشة البداية: QR + أعلى سكور + أزرار -->
<div id="startScreen">
  <h1>لعبة الديناصور والخفافيش</h1> <!-- عنوان -->
  <div id="qrBox">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://x1-monster-x1.github.io/gam.github.fun/" alt="QR">
    <p class="muted">امسح الكود للعب على الجوال</p>
  </div>

  <h3>أعلى سكور: <span id="bestScoreHome">0</span></h3> <!-- أعلى سكور محفوظ -->

  <div>
    <button class="btn" onclick="startGame()">ابدأ اللعب</button> <!-- بدء اللعبة -->
    <button class="btn" onclick="toggleSettings(true)">الإعدادات ⚙️</button> <!-- فتح الإعدادات -->
  </div>
</div>

<!-- نافذة الإعدادات (تظهر فوق الشاشة الرئيسية) -->
<div id="settingsMenu">
  <h2>إعدادات اللعبة</h2>
  <label>لون الخلفية:</label>
  <input type="color" id="bgColorInput" value="#ffffff"><br>
  <label>لون الخفافيش:</label>
  <input type="color" id="batColorInput" value="#000000"><br>
  <label>صعوبة البداية:</label>
  <select id="difficultySelect">
    <option value="easy">سهل</option>
    <option value="normal" selected>عادي</option>
    <option value="hard">صعب</option>
  </select>
  <div style="margin-top:12px;">
    <button class="btn" onclick="saveSettings()">حفظ</button>
    <button class="btn" onclick="toggleSettings(false)">إغلاق</button>
  </div>
</div>

<!-- HUD النقاط -->
<div id="hud">النقاط: <span id="scoreVal">0</span></div>

<!-- زر الإيقاف/الاستئناف أثناء اللعب -->
<button id="pauseBtn" style="display:none" onclick="togglePause()">إيقاف</button>

<!-- عنصر اللاعب: صورة ديناصور (تم استبدال القطة بالديناصور) -->
<img id="player" src="https://png.pngtree.com/png-vector/20230118/ourmid/pngtree-cartoon-dinosaur-png-image_4669876.png" alt="player">

<!-- شاشة الخسارة -->
<div id="gameOver">
  <h1>خسرت!</h1>
  <p id="yourScore"></p>
  <h2>أفضل 6 نتائج</h2>
  <div id="scoreList"></div>
  <div style="margin-top:14px;">
    <button class="btn" onclick="restartToHome()">العودة للصفحة الرئيسية</button>
    <button class="btn" onclick="restartGame()">إعادة اللعب</button>
  </div>
</div>

<!-- كانفس الرسم -->
<canvas id="c"></canvas>

<script>
/* ------------------ جافاسكربت اللعبة (مفسر ومشروح) ------------------ */

/* عناصر DOM الأساسية */
const canvas = document.getElementById('c'); // عنصر الكانفس
const ctx = canvas.getContext('2d'); // سياق الرسم ثنائي الأبعاد
const playerEl = document.getElementById('player'); // عنصر صورة اللاعب (الديناصور)
const startScreen = document.getElementById('startScreen'); // شاشة البداية
const settingsMenu = document.getElementById('settingsMenu'); // نافذة الإعدادات
const gameOverEl = document.getElementById('gameOver'); // شاشة الخسارة
const scoreValEl = document.getElementById('scoreVal'); // عنصر عرض النقاط
const bestScoreHomeEl = document.getElementById('bestScoreHome'); // أعلى سكور في الهوم
const pauseBtn = document.getElementById('pauseBtn'); // زر الإيقاف/الاستئناف

/* متغيرات اللعبة */
let w = 0, h = 0; // أبعاد الكانفس
let score = 0; // النقاط الحالية
let running = false; // هل اللعبة تعمل؟
let paused = false; // هل اللعبة موقوفة مؤقتاً؟
let enemies = []; // مصفوفة الخفافيش
let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 }; // موقع المؤشر
let batColor = '#000000'; // لون الخفافيش
let bgColor = '#ffffff'; // لون الخلفية
let spawnRate = 0.03; // معدل التوليد الابتدائي
let enemySpeedBase = 3; // سرعة أساسية للخفافيش
let difficulty = 'normal'; // مستوى الصعوبة
let startTime = 0; // وقت بداية اللعبة

/* ضبط حجم الكانفس ليتناسب مع النافذة */
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize); // تحديث عند تغيير حجم النافذة

/* تتبع حركة الماوس واللمس */
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchmove', e => { if (e.touches && e.touches[0]) { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; } }, { passive: true });

/* تحميل الإعدادات من localStorage وتطبيقها */
function loadSettings() {
  bgColor = localStorage.getItem('bgColor') || '#ffffff';
  batColor = localStorage.getItem('batColor') || '#000000';
  difficulty = localStorage.getItem('difficulty') || 'normal';

  document.body.style.background = bgColor;
  document.getElementById('bgColorInput').value = bgColor;
  document.getElementById('batColorInput').value = batColor;
  document.getElementById('difficultySelect').value = difficulty;

  if (difficulty === 'easy') { spawnRate = 0.02; enemySpeedBase = 2; }
  else if (difficulty === 'normal') { spawnRate = 0.03; enemySpeedBase = 3; }
  else if (difficulty === 'hard') { spawnRate = 0.05; enemySpeedBase = 4; }
}
loadSettings(); // استدعاء أولي لتحميل الإعدادات

/* تحديث أعلى سكور في الصفحة الرئيسية */
function updateBestHome() {
  let best = JSON.parse(localStorage.getItem('topScores') || '[]');
  bestScoreHomeEl.innerText = best[0] || 0;
}
updateBestHome();

/* إظهار/إخفاء نافذة الإعدادات */
function toggleSettings(show) {
  settingsMenu.style.display = show ? 'block' : 'none';
}

/* حفظ الإعدادات من الواجهة */
function saveSettings() {
  const bg = document.getElementById('bgColorInput').value;
  const bat = document.getElementById('batColorInput').value;
  const diff = document.getElementById('difficultySelect').value;

  localStorage.setItem('bgColor', bg);
  localStorage.setItem('batColor', bat);
  localStorage.setItem('difficulty', diff);

  bgColor = bg; batColor = bat; difficulty = diff;
  document.body.style.background = bgColor;

  if (difficulty === 'easy') { spawnRate = 0.02; enemySpeedBase = 2; }
  else if (difficulty === 'normal') { spawnRate = 0.03; enemySpeedBase = 3; }
  else if (difficulty === 'hard') { spawnRate = 0.05; enemySpeedBase = 4; }

  toggleSettings(false);
}

/* بدء اللعبة من شاشة البداية */
function startGame() {
  startScreen.style.display = 'none'; // إخفاء الشاشة الرئيسية
  score = 0; enemies = []; running = true; paused = false;
  pauseBtn.style.display = 'block'; pauseBtn.innerText = 'إيقاف'; // إظهار زر الإيقاف
  startTime = performance.now();
  loop(); // بدء الحلقة
}

/* إعادة للصفحة الرئيسية */
function restartToHome() {
  gameOverEl.style.display = 'none';
  startScreen.style.display = 'flex';
  pauseBtn.style.display = 'none';
  updateBestHome();
}

/* إعادة تشغيل اللعبة مباشرة */
function restartGame() {
  gameOverEl.style.display = 'none';
  score = 0; enemies = []; running = true; paused = false;
  pauseBtn.style.display = 'block'; pauseBtn.innerText = 'إيقاف';
  startTime = performance.now();
  loop();
}

/* تبديل الإيقاف/الاستئناف */
function togglePause() {
  if (!running) return;
  paused = !paused;
  pauseBtn.innerText = paused ? 'استئناف' : 'إيقاف';
  if (!paused) loop(); // إذا استأنفنا، نعيد تشغيل الحلقة
}

/* الحلقة الأساسية */
function loop() {
  if (!running || paused) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

/* تحديث حالة اللعبة */
function update() {
  // زيادة النقاط
  score += 1;
  scoreValEl.innerText = score;

  // تحريك عنصر اللاعب لموقع المؤشر (مركز الصورة على المؤشر)
  playerEl.style.left = mouse.x + 'px';
  playerEl.style.top = mouse.y + 'px';

  // توليد خفافيش عشوائية
  if (Math.random() < spawnRate) {
    const speed = enemySpeedBase + Math.random() * 2 + (score / 1500); // زيادة طفيفة مع النقاط
    enemies.push({ x: Math.random() * w, y: -40, s: speed, wobble: Math.random() * 2 });
  }

  // تحريك الخفافيش وفحص التصادم
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.y += e.s;
    e.x += Math.sin((e.y + i * 10) / 30) * e.wobble;

    const dx = mouse.x - e.x;
    const dy = mouse.y - e.y;
    const dist = Math.hypot(dx, dy);

    if (dist < 40) { // إذا التصادم
      endGame();
      return;
    }

    if (e.y > h + 50) enemies.splice(i, 1); // إزالة الخفافيش خارج الشاشة
  }

  // زيادة صعوبة تدريجياً مع الوقت
  const elapsed = (performance.now() - startTime) / 1000;
  if (elapsed > 10 && elapsed < 60) spawnRate = Math.min(0.06, spawnRate + 0.0005);
  else if (elapsed >= 60) spawnRate = Math.min(0.12, spawnRate + 0.001);
}

/* رسم الخفافيش */
function draw() {
  ctx.clearRect(0, 0, w, h); // مسح الكانفس

  enemies.forEach(e => {
    ctx.fillStyle = batColor;
    ctx.beginPath();
    ctx.ellipse(e.x, e.y, 16, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    // جناح أيسر
    ctx.beginPath();
    ctx.moveTo(e.x - 16, e.y);
    ctx.lineTo(e.x - 32, e.y - 12);
    ctx.lineTo(e.x - 16, e.y - 6);
    ctx.closePath();
    ctx.fill();

    // جناح أيمن
    ctx.beginPath();
    ctx.moveTo(e.x + 16, e.y);
    ctx.lineTo(e.x + 32, e.y - 12);
    ctx.lineTo(e.x + 16, e.y - 6);
    ctx.closePath();
    ctx.fill();
  });
}

/* نهاية اللعبة: حفظ أفضل 6 وعرض شاشة الخسارة */
function endGame() {
  running = false;
  pauseBtn.style.display = 'none';
  document.getElementById('yourScore').innerText = 'نتيجتك: ' + score;

  let list = JSON.parse(localStorage.getItem('topScores') || '[]');
  list.push(score);
  list.sort((a,b) => b - a);
  list = list.slice(0,6);
  localStorage.setItem('topScores', JSON.stringify(list));

  // عرض أفضل 6
  let html = '';
  list.forEach((s,i) => html += `${i+1} - ${s}<br>`);
  document.getElementById('scoreList').innerHTML = html;

  gameOverEl.style.display = 'flex';
  updateBestHome();
}

/* منع السحب الافتراضي على اللمس داخل الكانفس لتحسين تجربة اللعب */
document.addEventListener('touchstart', function(e){ if (e.target === canvas) e.preventDefault(); }, { passive: false });

/* بدء اللعبة بالضغط على Enter من لوحة المفاتيح (إذا كانت شاشة البداية ظاهرة) */
document.addEventListener('keydown', function(e){ if (e.key === 'Enter' && !running && startScreen.style.display !== 'none') startGame(); });

/* تهيئة أولية: وضع اللاعب في منتصف الشاشة */
playerEl.style.left = (window.innerWidth/2) + 'px';
playerEl.style.top = (window.innerHeight/2) + 'px';

/* تحديث أبعاد الكانفس عند التحميل (مكرر للتأكد) */
resize();

/* تطبيق لون الخفافيش الافتراضي من الإعدادات المحفوظة */
batColor = localStorage.getItem('batColor') || batColor;

/* عرض أعلى سكور في الصفحة الرئيسية عند التحميل */
updateBestHome();

/* ------------------ نهاية السكربت ------------------ */
</script>

</body>
</html>












<!--
-----------
┌──────────────────────────────┐
│          Start Screen         │
└───────────────┬──────────────┘
                │ startGame()
                ▼
┌──────────────────────────────┐
│        Game Loop (loop)       │
│  ┌──────────────┬──────────┐ │
│  │ update()      │ draw()   │ │
│  └──────────────┴──────────┘ │
└───────────────┬──────────────┘
                │ تصادم؟
                ▼
┌──────────────────────────────┐
│          Game Over            │
└──────────────────────────────┘
-->
